name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - "modules/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write # required to post/update PR comments
  id-token: write # required for AWS OIDC auth

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.10.0"
  TF_IN_AUTOMATION: "true"
  AWS_REGION: "us-east-1"

jobs:
  fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: terraform fmt -check
        id: fmt
        run: terraform fmt -check -recursive -diff .

  plan:
    name: Plan (${{ matrix.env }})
    needs: fmt
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # OIDC — no static AWS keys stored anywhere.
      # Repo secret AWS_ROLE_ARN must point at a role trusted for GitHub's
      # OIDC provider, with a read-only policy attached (this workflow
      # never applies, only plans).
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Actual AWS deployment is not required by the assignment, so state
      # is ephemeral and local to the run — no need for a pre-provisioned
      # S3 backend/lock table in CI, and no risk of two PRs fighting over
      # a real lock.
      #
      # To point this at a real, already-provisioned backend instead, swap
      # the line below for:
      #   terraform init -backend-config="envs/${{ matrix.env }}/backend.tf" -input=false
      - name: Terraform Init
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="envs/${{ matrix.env }}/${{ matrix.env }}.tfvars" \
            -refresh=false \
            -input=false \
            -out=tfplan \
            -no-color
        continue-on-error: true

      - name: Show plan (human-readable)
        if: always()
        run: terraform show -no-color tfplan | tee plan_output_${{ matrix.env }}.txt

      # Option A: PR comment (sticky — updates in place on re-push)
      - name: Comment plan on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan-${{ matrix.env }}
          path: infra/plan_output_${{ matrix.env }}.txt
          recreate: false

      # Option B: workflow artifact (kept as well, not just as a fallback)
      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.env }}
          path: |
            infra/tfplan
            infra/plan_output_${{ matrix.env }}.txt
          retention-days: 14

      - name: Fail job if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
